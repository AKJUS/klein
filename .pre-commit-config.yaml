ci:
  skip:
    - check-manifest

repos:

  - repo: https://github.com/asottile/pyupgrade
    rev: "v3.21.2"
    hooks:
      - id: pyupgrade
        args: ["--py37-plus", "--keep-runtime-typing"]

  - repo: https://github.com/psf/black
    rev: "25.1.0"
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/autoflake
    rev: "v2.3.1"
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --expand-star-imports
          - --remove-duplicate-keys
          - --remove-unused-variables

  - repo: https://github.com/PyCQA/flake8
    rev: "7.3.0"
    hooks:
      - id: flake8
        additional_dependencies:
          # duplicated because pre-commit cannot manage dependencies normally;
          # see https://github.com/pre-commit/pre-commit/issues/730 - for now,
          # paste and reformat from requirements/flake8.txt manually
          - attrs==26.1.0
          # via flake8-bugbear
          - flake8==7.3.0
          # via
          #   flake8-bugbear
          #   flake8-docstrings
          #   flake8-mutable
          #   flake8-pep3101
          #   pep8-naming
          - flake8-bugbear==25.11.29
          # via -r flake8-deps.in
          - flake8-docstrings==1.7.0
          # via -r flake8-deps.in
          - flake8-mutable==1.2.0
          # via -r flake8-deps.in
          - flake8-pep3101==3.0.0
          # via -r flake8-deps.in
          - mccabe==0.7.0
          # via flake8
          - pep8-naming==0.15.1
          # via -r flake8-deps.in
          - pycodestyle==2.14.0
          # via
          #   -r flake8-deps.in
          #   flake8
          - pydocstyle==6.3.0
          # via
          #   -r flake8-deps.in
          #   flake8-docstrings
          - pyflakes==3.4.0
          # via
          #   -r flake8-deps.in
          #   flake8
          - snowballstemmer==3.0.1
          # via pydocstyle

  - repo: https://github.com/asottile/yesqa
    rev: "v1.5.0"
    hooks:
      - id: yesqa
        additional_dependencies:
          - attrs==26.1.0
          # via flake8-bugbear
          - flake8==7.3.0
          # via
          #   flake8-bugbear
          #   flake8-docstrings
          #   flake8-mutable
          #   flake8-pep3101
          #   pep8-naming
          - flake8-bugbear==25.11.29
          # via -r flake8-deps.in
          - flake8-docstrings==1.7.0
          # via -r flake8-deps.in
          - flake8-mutable==1.2.0
          # via -r flake8-deps.in
          - flake8-pep3101==3.0.0
          # via -r flake8-deps.in
          - mccabe==0.7.0
          # via flake8
          - pep8-naming==0.15.1
          # via -r flake8-deps.in
          - pycodestyle==2.14.0
          # via
          #   -r flake8-deps.in
          #   flake8
          - pydocstyle==6.3.0
          # via
          #   -r flake8-deps.in
          #   flake8-docstrings
          - pyflakes==3.4.0
          # via
          #   -r flake8-deps.in
          #   flake8
          - snowballstemmer==3.0.1
          # via pydocstyle
        pass_filenames: false

  - repo: https://github.com/PyCQA/isort
    rev: "6.0.1"
    hooks:
    - id: isort
      args: ["--filter-files"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v5.0.0"
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-new-submodules
      - id: mixed-line-ending
#     - id: no-commit-to-branch
#       args: ["--branch", "master"]
      - id: name-tests-test
        args:
          - --pytest-test-first
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: "v1.10.0"
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: python-no-eval
      - id: python-use-type-annotations
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
      - id: text-unicode-replacement-char

  - repo: https://github.com/mgedmin/check-manifest
    rev: "0.50"
    hooks:
      - id: check-manifest
